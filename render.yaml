# Render Blueprint — https://render.com/docs/blueprint-spec
# MongoDB: use MongoDB Atlas and set MONGODB_URI on ai-research-api.

services:
  - type: web
    name: ai-research-api
    env: node
    buildCommand: npm install && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CORS_ORIGIN
        value: https://ai-research-web.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false

  - type: web
    name: ai-research-web
    env: static
    buildCommand: npm install && npm run build --workspace=web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_USE_MOCK
        value: "false"
      - key: VITE_API_URL
        value: https://ai-research-api.onrender.com
