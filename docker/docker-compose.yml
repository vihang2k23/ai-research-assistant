services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: research-pgvector
    restart: unless-stopped
    ports:
      - "5440:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: research
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
